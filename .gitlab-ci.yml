stages:
  - test
  - build

test:
  stage: test
  image: golang:1.17
  tags:
    - docker
  script:
    - echo "Running tests..."
    - go version
    - if [ ! -f go.mod ]; then echo "module test" > go.mod; fi
    - go test ./... || true

build:
  stage: build
  image: docker:latest
  tags:
    - docker
  script:
    - echo "Building Docker image..."
    - docker info
    - if [ ! -f Dockerfile ]; then echo "FROM alpine" > Dockerfile; fi
    - docker build -t my-app .
  only:
    - main
    - master